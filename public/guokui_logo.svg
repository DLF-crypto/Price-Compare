<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#glow)"/>

  <!-- Outer bread circle -->
  <circle cx="128" cy="106" r="58" fill="rgba(255,255,255,0.1)"/>
  <circle cx="128" cy="106" r="58" fill="none" stroke="white" stroke-width="5.5"/>

  <!-- Inner ring detail -->
  <circle cx="128" cy="106" r="38" fill="none" stroke="white" stroke-width="2.5" opacity="0.3"/>

  <!-- Cross scoring pattern -->
  <line x1="128" y1="58" x2="128" y2="154" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="106" x2="176" y2="106" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Diagonal scoring -->
  <line x1="94" y1="72" x2="162" y2="140" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="162" y1="72" x2="94" y2="140" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Center knot -->
  <circle cx="128" cy="106" r="13" fill="rgba(255,255,255,0.25)"/>
  <circle cx="128" cy="106" r="13" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Small sesame seed dots -->
  <circle cx="110" cy="88" r="3" fill="white" opacity="0.45"/>
  <circle cx="148" cy="88" r="3" fill="white" opacity="0.45"/>
  <circle cx="110" cy="124" r="3" fill="white" opacity="0.4"/>
  <circle cx="148" cy="124" r="3" fill="white" opacity="0.4"/>

  <!-- GK text -->
  <text x="128" y="218" text-anchor="middle" fill="white" font-size="52" font-weight="800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="6" opacity="0.95">GK</text>
</svg>
